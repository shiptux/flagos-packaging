name: flagcx
upstream: flagos-ai/FlagCX
display_name: FlagCX
workflows:
  deb:
    name: build-deb.yml
    # W2 single-chain: nvidia only. Widen to "flagcx-*-packages" once the
    # other backends (metax, ascend) are added to the publish matrix.
    artifact_pattern: "flagcx-nvidia-packages"
  rpm:
    name: build-rpm.yml
    artifact_pattern: "flagcx-nvidia-rpm-packages"
notes: |
  Upstream produces three backends: nvidia, metax, ascend. For W2 we
  publish only nvidia (single-chain policy, see docs/single-chain-policy.md).
  metax/ascend are deferred until the publish matrix expands.
