name: flagtree
upstream: flagos-ai/FlagTree
display_name: FlagTree
workflows:
  deb:
    name: build-deb.yml
    # W2 single-chain: nvidia only.
    artifact_pattern: "flagtree-nvidia-packages"
  rpm:
    name: build-rpm.yml
    artifact_pattern: "flagtree-nvidia-rpm-packages"
notes: |
  FlagTree is the highest-fan-out component: 12 backends upstream, each
  with its own Triton version + LLVM hash. W2 publishes nvidia only
  (single-chain policy, see docs/single-chain-policy.md and
  docs/per-component-backends.md). The full matrix is a separate
  discussion that needs team alignment.
