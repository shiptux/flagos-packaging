name: flagtree
upstream: flagos-ai/FlagTree
display_name: FlagTree
workflows:
  deb:
    name: build-deb.yml
    artifact_pattern: "flagtree-*-packages"
  rpm:
    name: build-rpm.yml
    artifact_pattern: "flagtree-*-rpm-packages"
notes: |
  Currently only the nvidia backend is wired up (~36 min wall to build
  the wheel; final .deb is 84 MB). Other backends (mthreads, metax, amd,
  iluvatar, cambricon, hcu, xpu) require their respective vendor SDK in
  the build container and are not yet packaged.

  Installs into the "triton" Python namespace; conflicts with the
  upstream python3-triton package.
